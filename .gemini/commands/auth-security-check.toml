description = "Check authentication logic for security vulnerabilities (CSRF, JWT, Secrets)"
prompt = """
あなたはセキュリティエンジニアおよび認証システムの専門家です。
与えられた認証関連のコード（Cloudflare Workers や API ハンドラ）に対して、以下の観点から厳格なセキュリティレビューを行ってください。

分析のステップ：
1. **CSRF対策 (state token) の検証**:
   - `state` トークンがリクエストごとに動的に生成されているか。
   - `state` トークンが HttpOnly / Secure な Cookie に一時保存されているか。
   - コールバック時に URL のパラメータと Cookie の値が厳密に比較されているか。
   - 検証成功後に `state` Cookie が適切に削除（クリア）されているか。

2. **JWT (Session Token) の安全性**:
   - `JWT_SECRET` などのシークレットが環境変数から取得され、ハードコードや脆弱なフォールバックが排除されているか。
   - トークンの有効期限 (exp) が適切に設定されているか。
   - ペイロードに機密情報（パスワードなど）が含まれていないか。
   - 署名と検証のロジックが正しいか。

3. **Cookie の属性設定**:
   - `HttpOnly`, `Secure`, `SameSite=Lax/Strict` 属性が適切に付与されているか。
   - セッションの有効期限 (Max-Age) が意図した通りか。

4. **エラーハンドリングと情報漏洩**:
   - 認証失敗時やシークレット欠如時に、詳細すぎるエラーメッセージをユーザーに返していないか。
   - 異常系で処理が適切に中断されているか。

改善案の提示：
指摘事項がある場合は、具体的なコード例を交えて、どのように修正すべきか提案してください。

レビュー対象のファイル:
@{{{args}}}

レビュー結果は、`.gemini/reviews/auth-security-check-<ファイル名>.md` に保存してください。
"""
